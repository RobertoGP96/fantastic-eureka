<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Icono FE: cuadro redondeado partido por una ola senoidal (pecera).
       Letras azules sobre la superficie y blancas bajo el agua. -->
  <defs>
    <clipPath id="box"><rect width="512" height="512" rx="118"/></clipPath>
    <clipPath id="above"><path d="M0 262 C40 226 88 226 128 262 C168 298 216 298 256 262 C296 226 344 226 384 262 C424 298 472 298 512 262 L512 0 L0 0 Z"/></clipPath>
    <clipPath id="below"><path d="M0 262 C40 226 88 226 128 262 C168 298 216 298 256 262 C296 226 344 226 384 262 C424 298 472 298 512 262 L512 512 L0 512 Z"/></clipPath>
    <linearGradient id="water" x1="0" y1="262" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f8fe6"/>
      <stop offset="1" stop-color="#1257b8"/>
    </linearGradient>
    <g id="letters">
      <path d="M136 150 h116 v46 h-70 v44 h62 v44 h-62 v86 h-46 Z"/>
      <path d="M282 150 h118 v46 h-72 v42 h64 v44 h-64 v42 h72 v46 h-118 Z"/>
    </g>
  </defs>
  <g clip-path="url(#box)">
